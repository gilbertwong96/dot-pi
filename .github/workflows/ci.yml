name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run check
      - run: bun test
      - run: sh -n install.sh
      - run: ./install.sh --dry-run --yes --no-agent-browser --with-companions
      - run: DOT_PI_REF=v0.2.1 ./install.sh --dry-run --yes --no-agent-browser
